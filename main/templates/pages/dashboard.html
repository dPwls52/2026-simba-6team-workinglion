{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'main/css/dashboard.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/dashboard_animation.css' %}">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="body">
                <div class="header">
                    <img src="{% static 'main/img/bird2.svg' %}"  class="bird" alt="캐릭터">

                <div class="coin">
                    <svg class="icon-coin" xmlns="http://www.w3.org/2000/svg" width="33" height="33" viewBox="0 0 33 33" fill="none">

095C19.4838 9.84832 18.7988 9.64711 18.0964 9.62497H17.875C17.875 9.2603 17.7301 8.91056 17.4723 8.6527C17.2144 8.39484 16.8647 8.24997 16.5 8.24997ZM17.875 17.875C18.2397 17.875 18.5894 18.0198 18.8473 18.2777C19.1051 18.5356 19.25 18.8853 19.25 19.25C19.25 19.6146 19.1051 19.9644 18.8473 20.2222C18.5894 20.4801 18.2397 20.625 17.875 20.625V17.875ZM15.125 12.375V15.125C14.7603 15.125 14.4106 14.9801 14.1527 14.7222C13.8949 14.4644 13.75 14.1146 13.75 13.75C13.75 13.3853 13.8949 13.0356 14.1527 12.7777C14.4106 12.5198 14.7603 12.375 15.125 12.375Z" fill="#FFBF00"/>
                    </svg>
                    <p class="coin-num">{{ request.user.profile.point }}</p>
                </div>
            </div>

            <div class="list">
                <p class="list-title">pot - list</p>
                <div class="box-list">
                    {% for pot in pots %}
                    <a href="{% url 'main:pot_detail' pot.id %}">
                        <div class="box pink-box">
                            <div class="box-left">
                                <div class="left-text">
                                    <p class="pot-name">{{ pot.pot_name }} 팟</p>
                                    <p class="people">{{ pot.pot_people }}명 | {{ pot.days }}일 챌린지</p>
                                </div>
                                <div class="d-day">
                                    {% if pot.is_ended %}<p class="d-day-text">완료</p>{% else %}<p class="d-day-text">D - {{ pot.d_day }}</p>{% endif %}
                                </div>
                            </div>
                            <div class="box-right">
                                <button class="pot-btn">
                                    <p class="btn-text2">팟 입장</p> 
                                </button>
                            </div>
                        </div>
                    </a>
                    {% empty %}
                    {% endfor %}

                        <div class="box">
                            <a href="{% url 'main:pot_choice' %}">
                                <button class="plus-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                        <path class="plus" d="M19.3421 11.0526H11.0526V19.3421H8.28947V11.0526H0V8.28947H8.28947V0H11.0526V8.28947H19.3421V11.0526Z" fill="#7A6229"/>
                                    </svg>
                                </button>
                            </a>
                        </div>

                    </div>
                </div>
            </div>
            <div class="footer">
                <div class="footer-body">
                    <a href="{% url 'main:dashboard' %}">
                    <button class="icon">
                        <svg class="icon-home" xmlns="http://www.w3.org/2000/svg" width="29" height="27" viewBox="0 0 29 27" fill="none">
                            <path d="M14.3867 1.45898C14.4471 1.40516 14.5461 1.40511 14.6064 1.45898L26.5576 12.2227H24.1104V24.6738C24.1103 24.7125 24.096 24.7505 24.0635 24.7832C24.0307 24.816 23.992 24.831 23.9531 24.8311H19.2246C19.1857 24.831 19.1471 24.816 19.1143 24.7832C19.0817 24.7505 19.0675 24.7125 19.0674 24.6738V15.375H9.92578V24.6738C9.92569 24.7126 9.91069 24.7504 9.87793 24.7832C9.84515 24.816 9.80737 24.831 9.76855 24.8311H5.04004C5.00111 24.8311 4.96255 24.8161 4.92969 24.7832C4.89714 24.7505 4.88291 24.7125 4.88281 24.6738V12.2227H2.43555L14.3867 1.45898Z" stroke="#7A6229" stroke-width="2.83693"/>
                        </svg>
                        <p class="home-text">HOME</p>
                    </button>
                    </a>
                    <a href="{% url 'users:mypage' request.user.id %}">
                    <button class="icon">
                        <svg class="icon-my" xmlns="http://www.w3.org/2000/svg" width="39" height="39" viewBox="0 0 39 39" fill="none">
                            <path d="M19.5 24.0977C21.5009 24.0977 24.5807 24.6102 27.126 25.6299C28.3975 26.1393 29.4511 26.7424 30.165 27.4014C30.8697 28.0518 31.1523 28.6645 31.1523 29.25V30.875C31.1523 31.0244 31.0244 31.1523 30.875 31.1523H8.125C7.97562 31.1523 7.84766 31.0244 7.84766 30.875V29.25C7.84766 28.6645 8.13033 28.0518 8.83496 27.4014C9.54889 26.7424 10.6025 26.1393 11.874 25.6299C14.4193 24.6102 17.4991 24.0977 19.5 24.0977ZM19.5 7.84766C22.3469 7.84766 24.6523 10.1531 24.6523 13C24.6523 15.8469 22.3469 18.1523 19.5 18.1523C16.6531 18.1523 14.3477 15.8469 14.3477 13C14.3477 10.1531 16.6531 7.84766 19.5 7.84766Z" stroke="#9E9E9E" stroke-width="2.69559"/>
                        </svg>
                        <p class="my-text">MY</p>
                    </button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
