{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'main/css/photo_vote.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/photo_vote_animation.css' %}">
    <title>인증 확인</title>
</head>
<body>
    <div class="container">
        <div class="main">
            <div class="header">
                <div class="back">
                    <a href="{% url 'main:pot_detail' pot.id %}">
                        <div class="back-btn">
                            <svg class="back-text" xmlns="http://www.w3.org/2000/svg" width="29" height="29" viewBox="0 0 29 29" fill="none">
                                <path d="M24.1668 14.5L4.8335 14.5M12.0835 21.75L4.8335 14.5L12.0835 7.25" stroke="black" stroke-width="1.625" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </a>
                </div>
                <div class="title">
                    <p class="title-text">{{ target_user.profile.nickname }} 인증 확인</p>
                </div>
            </div>
            <div class="body">
                <div class="body-top">
                    <div class="subtitle">
                        <p class="goal">{{ pot.pot_name }}</p>
                        <p class="date">{{ now|date:"Y.m.d" }}</p>
                    </div>
                    <div class="photospace">
                        <img src="{{ proof.image.url }}" alt="인증사진" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                    </div>
                </div>
                <div class="body-bottom">
                    <div class="vote-box">
                        <div class="vote-title">
                            <p class="maintitle">현재 투표 현황</p>
                            <p class="subtitle">{{ total_participants }}명 중 {{ responded_count }}명 응답</p>
                        </div>
                        <div class="grad-box">
                            <div class="gradation"></div>
                            <div class="grad-text">
                                <p class="agree">인정 {{ agree_count }}명 ({{ agree_pct }}%)</p>
                                <p class="disagree">미인정 {{ disagree_count }}명 ({{ disagree_pct }}%)</p>
                            </div>
                        </div>
                    </div>
                    <div class="vote-choice">
                        <p class="opinion">나의 의견은?</p>
                        <div class="vote-body">
                            <form action="{% url 'main:photo_vote' pot.id target_user.id %}" method="post">
                                {% csrf_token %}
                                <div class="button-box">
                                    <div class="box-body1">
                                        <button class="agree-btn" type="submit" name="vote" value="approve">
                                            <img src="{% static 'main/img/agree.png' %}" class="agree-icon" alt="인정">
                                            <p class="agree-text">인정해요</p>
                                        </button>
                                    </div>
                                    <div class="box-body2">
                                        <button class="disagree-btn" type="submit" name="vote" value="reject">
                                            <img src="{% static 'main/img/agree.png' %}" class="disagree-icon" alt="미인정">
                                            <p class="disagree-text">인정못해요</p>
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
